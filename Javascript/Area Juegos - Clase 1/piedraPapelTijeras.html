<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedra, papel o tijera</title>

    <script>

    //Consigna: crear una función para darle un número aleatorio a nuestra variable pc
    function aleatorio(min, max){
        return Math.floor(Math.random() * (max - min + 1) + min)
    }

    function jugar(){
        // 1 = piedra, 2 = papel, 3 = tijera
        let jugador = 0
        let pc = aleatorio(1, 3)

        jugador = prompt("Elige: 1. Piedra, 2. Papel, 3. Tijera")

        if(jugador == 1) {
            alert("Elegiste piedra")

        } else if(jugador == 2) {
            alert("Elegiste papel")

        } else if(jugador == 3){
            alert("Elegiste tijera")

        } else{
            alert("Elegiste perder. Esa opción no es valida")
            return
        }

        //Combate
        if(pc == jugador){
            alert("EMPATE")

        } else if(jugador == 1 && pc == 3){
            alert("GANASTE!")

        } else if(jugador == 2 && pc == 1){
            alert("GANASTE!")

        } else if(jugador == 3 && pc == 2){
            alert("GANASTE!")

        } else{
            alert("PERDISTE")
        }
    }

    // Al cargar la página, se juega la primera vez
    window.onload = function() {
        jugar();
    }

    //Agregamos funcionalidad al boton de reinicio
    function reiniciarJuego(){
        jugar();
    }

    </script>
</head>

<body>
    <h1>Piedra, papel o tijera</h1>
    <button onclick="reiniciarJuego()">Reiniciar Juego</button>
</body>
</html>
