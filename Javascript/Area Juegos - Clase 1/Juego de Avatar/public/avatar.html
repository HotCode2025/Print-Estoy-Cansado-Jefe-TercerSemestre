<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Avatar: La leyenda de Aang</title>
</head>
<body>
    <h1>Avatar: La leyenda de Aang</h1>
    
    <section id="Selecciona un personaje">
        <h2>Seleccionar personaje</h2>

        <label for="Zuko">Zuko 🔥</label>
        <input type="radio" name="personaje" id="Zuko">
        
        <label for="Aang">Aang 💨</label>
        <input type="radio" name="personaje" id="Aang">
        
        <label for="Katara">Katara 💧</label>
        <input type="radio" name="personaje" id="Katara">
        
        <label for="Toph">Toph 🌱</label>
        <input type="radio" name="personaje" id="Toph">


    <button id="boton-personaje">Seleccionar</button>
    </section>

    <section id="Seleccionar-ataque">
        <h2>Elige tu ataque</h2>
        <p>Tu personaje tienen <span>3</span> vidas</p>
        <p>Los personajes del enemigo tienen <span>3</span> vidas</p>
        <p>
            <button id="boton-agua">Agua 💧</button>
            <button id="boton-tierra">Tierra 🌱</button>
            <button id="boton-fuego">Fuego 🔥</button>
            <button id="boton-aire">Aire 💨</button>
        </p>
    </section>

    <section id="Mensajes"> 
        <p>Tu personaje atacó con todo el poder del Fuego, el personaje enemico atacó con el medio poder de la tierra - ¡GANASTE! </p>

    </section>

    <section id="Reiniciar">
        <button id="boton-reiniciar">Reiniciar</button>
    </section>

        <script src="./js/avatar.js"></script>

</body>
</html>
